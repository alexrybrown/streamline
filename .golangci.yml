version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gosec
  settings:
    gosec:
      excludes:
        - G204 # subprocess launched with variable — expected for FFmpeg
    revive:
      rules:
        - name: blank-imports
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: exported
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/alexrybrown/streamline

run:
  timeout: 5m
