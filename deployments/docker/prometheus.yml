global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "stream-manager"
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: "encoder-worker"
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: "packager"
    static_configs:
      - targets: ["host.docker.internal:8082"]

  - job_name: "pipeline-controller"
    static_configs:
      - targets: ["host.docker.internal:8083"]

  - job_name: "api-server"
    static_configs:
      - targets: ["host.docker.internal:8084"]
